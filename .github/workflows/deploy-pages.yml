name: Deploy Next.js site to Pages

on:
  push:
    branches: ["main", "claude/deploy-github-pages-Jc47I"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Build static export
        env:
          # URL of the Cloudflare Worker that proxies VLM requests.
          # Set this as a repository variable (Settings → Variables → Actions)
          # to enable Claude by default in the deployed app. Leave unset
          # to fall back to the paste-your-own-key flow.
          NEXT_PUBLIC_VLM_PROXY_URL: ${{ vars.VLM_PROXY_URL }}
        run: npm run build

      - name: Add nojekyll
        run: touch out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
